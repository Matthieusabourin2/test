<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Tasks Dashboard</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f232c;
      --border: #2a2f3a;
      --text: #e6e8ee;
      --muted: #9aa3b2;
      --accent: #c98a5d;
      --accent-2: #7aa2f7;
      --danger: #e06c75;
      --ok: #98c379;
      --radius: 10px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-2: #f0f2f6;
        --border: #e1e4ea;
        --text: #1c1f26;
        --muted: #5b6472;
        --accent: #c2410c;
        --accent-2: #2563eb;
        --danger: #b91c1c;
        --ok: #15803d;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }
    header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    h1 { margin: 0; font-size: 1.5rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    button, .btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, background 0.15s;
    }
    button:hover, .btn:hover { border-color: var(--accent); }
    button.primary, .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { filter: brightness(1.1); }
    button.danger { color: var(--danger); }
    button.ghost { background: transparent; }
    .btn[aria-disabled="true"] { opacity: 0.45; pointer-events: none; }

    .tasks { display: grid; gap: 12px; }
    .task {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .task h3 { margin: 0 0 6px; font-size: 1.05rem; }
    .task .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
    .task .meta code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; }
    .task-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .task-actions .sep { flex: 1; }

    .empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    dialog {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
      max-width: 640px;
      width: 92%;
    }
    dialog::backdrop { background: rgba(0,0,0,0.5); }
    .modal-header, .modal-footer { padding: 14px 16px; }
    .modal-header { border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 16px; display: grid; gap: 12px; }
    .modal-footer { border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], textarea {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.95rem;
    }
    textarea { min-height: 140px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; }
    .hint { font-size: 0.8rem; color: var(--muted); }
    .warn { color: var(--danger); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--panel-2); border: 1px solid var(--border); padding: 10px 14px;
      border-radius: var(--radius); font-size: 0.9rem; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .badge {
      font-size: 0.75rem; padding: 2px 8px; border-radius: 999px;
      background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    }

    /* sessions panel */
    .sessions-panel { margin-top: 32px; }
    .sessions-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .sessions-header h2 { margin: 0; font-size: 1.05rem; }
    .sessions-header .count { color: var(--muted); font-size: 0.8rem; }
    .sessions-list { display: flex; flex-direction: column; gap: 2px; }
    .session {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.92rem;
    }
    .session:hover { background: var(--panel-2); }
    .dot { width: 9px; height: 9px; border-radius: 50%; justify-self: center; }
    .dot.working      { background: var(--accent-2); animation: pulse 1.4s infinite; }
    .dot.unread       { background: var(--ok); animation: pulse 1.4s infinite; }
    .dot.read         { background: var(--ok); }
    .dot.needs_action { background: var(--danger); animation: pulse 1.4s infinite; }
    .dot.idle         { background: var(--muted); opacity: 0.5; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    .session.idle { opacity: 0.55; }
    .session { cursor: pointer; user-select: none; }
    .session-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-when  { color: var(--muted); font-size: 0.78rem; white-space: nowrap; }
    .session-project { color: var(--muted); font-size: 0.78rem; margin-left: 8px; }

    .sidecar-banner {
      background: var(--panel-2); border: 1px dashed var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      color: var(--muted); font-size: 0.85rem;
    }
    .sidecar-banner code { background: var(--panel); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Claude Tasks Dashboard</h1>
        <div class="subtitle">Lance tes prompts dans Claude Desktop (Chat / Cowork / Code) en un clic.</div>
      </div>
      <div class="toolbar">
        <button id="add-btn" class="primary">+ Nouvelle tâche</button>
        <button id="export-btn" class="ghost">Exporter</button>
        <button id="import-btn" class="ghost">Importer</button>
        <input type="file" id="import-file" accept="application/json" hidden />
      </div>
    </header>

    <div id="tasks" class="tasks"></div>

    <section class="sessions-panel">
      <div class="sessions-header">
        <h2>Sessions récentes</h2>
        <span class="count" id="sessions-count"></span>
      </div>
      <div id="sessions-list" class="sessions-list"></div>
    </section>

    <dialog id="editor">
      <form method="dialog">
        <div class="modal-header">
          <strong id="editor-title">Nouvelle tâche</strong>
          <button type="button" id="close-btn" class="ghost" aria-label="Fermer">✕</button>
        </div>
        <div class="modal-body">
          <div>
            <label for="f-title">Titre <span class="hint">(repris en H1 dans le prompt + signal renforcé pour l'auto-titreur Claude)</span></label>
            <input type="text" id="f-title" required maxlength="120" placeholder="Ex: Revue de PR quotidienne" />
          </div>
          <div>
            <label for="f-prompt">Prompt</label>
            <textarea id="f-prompt" required placeholder="Le prompt qui sera pré-rempli dans Claude…"></textarea>
            <div class="hint" id="prompt-hint">0 caractères</div>
          </div>
          <div>
            <label for="f-folder">Dossier de travail <span class="hint">(optionnel — pour Cowork et Code)</span></label>
            <input type="text" id="f-folder" placeholder="/Users/moi/code/projet" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="delete-btn" class="danger" hidden>Supprimer</button>
          <span style="flex:1"></span>
          <button type="button" id="cancel-btn" class="ghost">Annuler</button>
          <button type="button" id="save-btn" class="primary">Enregistrer</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script>
    const STORAGE_KEY = 'claude-dashboard:tasks:v2';
    const LEGACY_KEY = 'claude-dashboard:tasks:v1';
    const PROMPT_LIMIT = 14000;

    const tasksEl = document.getElementById('tasks');
    const dialog = document.getElementById('editor');
    const editorTitle = document.getElementById('editor-title');
    const fTitle = document.getElementById('f-title');
    const fPrompt = document.getElementById('f-prompt');
    const fFolder = document.getElementById('f-folder');
    const promptHint = document.getElementById('prompt-hint');
    const deleteBtn = document.getElementById('delete-btn');

    let editingId = null;

    function uid() {
      return 't_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }
    function load() {
      try {
        const v2 = localStorage.getItem(STORAGE_KEY);
        if (v2) return JSON.parse(v2);
        const v1raw = localStorage.getItem(LEGACY_KEY);
        if (v1raw) {
          const v1 = JSON.parse(v1raw);
          const migrated = (Array.isArray(v1) ? v1 : []).map(t => ({
            id: t.id || uid(),
            title: t.title || '',
            prompt: t.prompt || '',
            folder: t.folder || t.cwd || '',
          }));
          save(migrated);
          return migrated;
        }
        return [];
      } catch { return []; }
    }
    function save(tasks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    // Maximize the chance Claude's auto-titler picks up the exact task title:
    // 1) Open with "# <TITLE>" — markdown H1 is the strongest topic signal.
    // 2) Ask Claude to echo the title as a "## <TITLE>" header in its reply.
    //    The auto-titler then sees the title in both the user message AND the
    //    assistant reply — much harder to ignore than a single mention.
    function buildPrompt(task) {
      const title = (task.title || '').trim();
      const body = (task.prompt || '').trim();
      if (!title) return body;
      const titleEsc = title.replace(/"/g, '\\"');
      const footer = `\n\n---\n_Pour mon historique : commence ta réponse par exactement la ligne \`## ${titleEsc}\` (sans rien d'autre sur cette ligne), puis saute une ligne et réponds normalement._`;
      return `# ${title}\n\n${body}${footer}`;
    }

    function chatUrl(task) {
      const p = new URLSearchParams();
      p.set('q', buildPrompt(task));
      return `claude://claude.ai/new?${p.toString()}`;
    }
    function coworkUrl(task) {
      const p = new URLSearchParams();
      p.set('q', buildPrompt(task));
      if (task.folder && task.folder.trim()) p.set('folder', task.folder.trim());
      return `claude://cowork/new?${p.toString()}`;
    }
    function codeUrl(task) {
      const p = new URLSearchParams();
      p.set('q', buildPrompt(task));
      if (task.folder && task.folder.trim()) p.set('folder', task.folder.trim());
      return `claude://code/new?${p.toString()}`;
    }

    function render() {
      const tasks = load();
      tasksEl.innerHTML = '';
      if (tasks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.innerHTML = `Aucune tâche pour le moment. Clique sur <strong>+ Nouvelle tâche</strong> pour commencer.`;
        tasksEl.appendChild(empty);
        return;
      }
      for (const t of tasks) {
        const fullLen = buildPrompt(t).length;
        const over = fullLen > PROMPT_LIMIT;

        const meta = [];
        if (t.folder) meta.push(`<code>${escapeHtml(t.folder)}</code>`);
        meta.push(`<span class="badge">${fullLen} car.</span>`);

        const card = document.createElement('div');
        card.className = 'task';
        card.innerHTML = `
          <h3>${escapeHtml(t.title)}</h3>
          <div class="meta">${meta.join('')}</div>
          <div class="task-actions">
            <a class="btn" data-action="chat" ${over ? 'aria-disabled="true" title="Prompt trop long"' : ''}>Chat</a>
            <a class="btn" data-action="cowork" ${over ? 'aria-disabled="true" title="Prompt trop long"' : ''}>Cowork</a>
            <a class="btn" data-action="code" ${over ? 'aria-disabled="true" title="Prompt trop long"' : ''}>Code</a>
            <button data-action="copy" class="ghost" title="Copier le prompt complet">Copier</button>
            <span class="sep"></span>
            <button data-action="edit" class="ghost">Éditer</button>
          </div>
        `;
        if (!over) {
          card.querySelector('[data-action="chat"]').href = chatUrl(t);
          card.querySelector('[data-action="cowork"]').href = coworkUrl(t);
          card.querySelector('[data-action="code"]').href = codeUrl(t);
        }
        card.querySelector('[data-action="copy"]').addEventListener('click', () => copyPrompt(buildPrompt(t)));
        card.querySelector('[data-action="edit"]').addEventListener('click', () => openEditor(t.id));

        tasksEl.appendChild(card);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function openEditor(id) {
      editingId = id || null;
      if (id) {
        const t = load().find(x => x.id === id);
        if (!t) return;
        editorTitle.textContent = 'Modifier la tâche';
        fTitle.value = t.title;
        fPrompt.value = t.prompt;
        fFolder.value = t.folder || '';
        deleteBtn.hidden = false;
      } else {
        editorTitle.textContent = 'Nouvelle tâche';
        fTitle.value = '';
        fPrompt.value = '';
        fFolder.value = '';
        deleteBtn.hidden = true;
      }
      updatePromptHint();
      dialog.showModal();
      setTimeout(() => fTitle.focus(), 0);
    }

    function updatePromptHint() {
      const full = buildPrompt({ title: fTitle.value, prompt: fPrompt.value }).length;
      if (full > PROMPT_LIMIT) {
        promptHint.innerHTML = `${full} caractères envoyés à Claude — <span class="warn">au-delà de la limite Claude Desktop (${PROMPT_LIMIT})</span>`;
      } else {
        promptHint.textContent = `${full} caractères envoyés à Claude (titre + prompt + instruction de titrage)`;
      }
    }
    fPrompt.addEventListener('input', updatePromptHint);
    fTitle.addEventListener('input', updatePromptHint);

    function saveFromForm() {
      const title = fTitle.value.trim();
      const prompt = fPrompt.value;
      if (!title) { fTitle.reportValidity(); return; }
      if (!prompt.trim()) { fPrompt.reportValidity(); return; }
      const tasks = load();
      const data = {
        title,
        prompt,
        folder: fFolder.value.trim(),
      };
      if (editingId) {
        const i = tasks.findIndex(t => t.id === editingId);
        if (i >= 0) tasks[i] = { ...tasks[i], ...data };
      } else {
        tasks.push({ id: uid(), ...data });
      }
      save(tasks);
      dialog.close();
      render();
      toast(editingId ? 'Tâche mise à jour' : 'Tâche ajoutée');
    }

    function deleteCurrent() {
      if (!editingId) return;
      if (!confirm('Supprimer cette tâche ?')) return;
      save(load().filter(t => t.id !== editingId));
      dialog.close();
      render();
      toast('Tâche supprimée');
    }

    async function copyPrompt(text) {
      try {
        await navigator.clipboard.writeText(text);
        toast('Prompt copié');
      } catch {
        toast('Impossible de copier');
      }
    }

    function exportTasks() {
      const blob = new Blob([JSON.stringify(load(), null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `claude-tasks-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importTasks(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!Array.isArray(parsed)) throw new Error('Format invalide');
          const cleaned = parsed
            .filter(t => t && typeof t.title === 'string' && typeof t.prompt === 'string')
            .map(t => ({
              id: t.id || uid(),
              title: t.title,
              prompt: t.prompt,
              folder: t.folder || t.cwd || '',
            }));
          if (cleaned.length === 0) throw new Error('Aucune tâche valide');
          const merge = confirm(`${cleaned.length} tâche(s) trouvée(s). OK = ajouter aux existantes, Annuler = remplacer tout.`);
          const next = merge ? [...load(), ...cleaned] : cleaned;
          save(next);
          render();
          toast(`${cleaned.length} tâche(s) importée(s)`);
        } catch (e) {
          toast('Import échoué : ' + e.message);
        }
      };
      reader.readAsText(file);
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove('show'), 1800);
    }

    document.getElementById('add-btn').addEventListener('click', () => openEditor(null));
    document.getElementById('export-btn').addEventListener('click', exportTasks);
    document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file').click());
    document.getElementById('import-file').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) importTasks(file);
      e.target.value = '';
    });
    document.getElementById('save-btn').addEventListener('click', saveFromForm);
    document.getElementById('cancel-btn').addEventListener('click', () => dialog.close());
    document.getElementById('close-btn').addEventListener('click', () => dialog.close());
    deleteBtn.addEventListener('click', deleteCurrent);

    if (load().length === 0) {
      save([
        {
          id: uid(),
          title: 'Revue rapide du repo',
          prompt: 'Fais un état des lieux rapide du repo : branche actuelle, fichiers modifiés non commités, derniers commits, et propose 3 priorités pour aujourd\'hui.',
          folder: '',
        },
      ]);
    }
    render();

    // ----- Sessions panel (sidecar-driven) -----
    const SIDECAR_BASE = (location.port === '8765' || location.hostname === 'localhost')
      ? location.origin : 'http://localhost:8765';
    const sessionsListEl = document.getElementById('sessions-list');
    const sessionsCountEl = document.getElementById('sessions-count');
    let liveSessions = [];
    let sidecarAlive = false;

    const STATUS_LABEL = {
      working:      'Claude travaille',
      unread:       'fini — pas encore lu',
      read:         'fini et lu',
      needs_action: 'action attendue de toi',
      idle:         'inactive',
    };

    function relTime(ms) {
      const s = Math.round((Date.now() - ms) / 1000);
      if (s < 30) return 'à l\'instant';
      if (s < 60) return `${s}s`;
      const m = Math.round(s / 60);
      if (m < 60) return `${m} min`;
      const h = Math.round(m / 60);
      if (h < 24) return `${h}h`;
      return `${Math.round(h / 24)}j`;
    }

    function renderSidecarMissing() {
      sessionsCountEl.textContent = '';
      sessionsListEl.innerHTML = `
        <div class="sidecar-banner">
          Sidecar local non détecté. Ouvre cette page depuis <code>http://localhost:8765/</code> après avoir lancé <code>node sidecar/index.js</code>.
        </div>`;
    }

    function renderSessions() {
      if (!sidecarAlive) return;
      if (!liveSessions.length) {
        sessionsCountEl.textContent = '0';
        sessionsListEl.innerHTML = `<div class="sidecar-banner">Aucune session active dans les dernières 24h.</div>`;
        return;
      }
      sessionsCountEl.textContent = liveSessions.length;
      sessionsListEl.innerHTML = liveSessions.map(s => `
        <div class="session ${s.status}" data-session-id="${escapeHtml(s.sessionId)}" title="${escapeHtml(STATUS_LABEL[s.status] || s.status)} — clic pour ouvrir">
          <span class="dot ${s.status}"></span>
          <div class="session-title">
            ${escapeHtml(s.title || s.sessionId.slice(0, 8) + '…')}
            ${s.project ? `<span class="session-project">${escapeHtml(s.project)}</span>` : ''}
          </div>
          <span class="session-when">${relTime(s.lastEventTime)}</span>
        </div>
      `).join('');
      // Wire click handlers
      sessionsListEl.querySelectorAll('.session').forEach(el => {
        el.addEventListener('click', () => openClaudeCodeSession(el.dataset.sessionId));
      });
    }

    async function openClaudeCodeSession(sessionId) {
      if (!sessionId) return;
      // 1) Try the (undocumented) deep link. If it works, Claude Desktop opens
      //    the session. If not, nothing visible happens — and the clipboard
      //    fallback below still gives the user a one-command resume.
      const deepLink = `claude://code/${sessionId}`;
      try { window.location.href = deepLink; } catch {}

      // 2) Always also copy the CLI resume command as a safety net.
      const cmd = `claude --resume ${sessionId}`;
      try {
        await navigator.clipboard.writeText(cmd);
        toast(`Tentative d'ouverture + commande copiée : ${cmd}`);
      } catch {
        toast(`Commande de reprise : ${cmd}`);
      }
    }

    async function pollSessions() {
      try {
        const r = await fetch(`${SIDECAR_BASE}/api/sessions`, { cache: 'no-store' });
        if (!r.ok) throw new Error();
        const data = await r.json();
        sidecarAlive = true;
        liveSessions = data.sessions || [];
        renderSessions();
      } catch {
        if (sidecarAlive || liveSessions.length === 0) {
          sidecarAlive = false;
          renderSidecarMissing();
        }
      }
    }

    // SSE for instant push when something changes; HTTP poll every 2s as a safety net.
    function connectSse() {
      try {
        const es = new EventSource(`${SIDECAR_BASE}/api/events`);
        es.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'snapshot') {
              sidecarAlive = true;
              liveSessions = msg.sessions || [];
              renderSessions();
            }
          } catch {}
        };
        es.onerror = () => { /* browser auto-reconnects */ };
      } catch {}
    }

    pollSessions();
    connectSse();
    setInterval(pollSessions, 2000);
    // Refresh relative times even when nothing changed server-side
    setInterval(() => { if (sidecarAlive && liveSessions.length) renderSessions(); }, 15_000);
  </script>
</body>
</html>

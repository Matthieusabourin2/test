<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Dashboard</title>
  <style>
    :root {
      --bg: #1a1b26;
      --panel: #1f2335;
      --panel-2: #24283b;
      --border: #2c3047;
      --text: #c0caf5;
      --text-dim: #7982a9;
      --text-dimmer: #565f89;
      --accent: #7aa2f7;
      --accent-2: #bb9af7;
      --working: #2563eb;
      --needs-action: #b45309;
      --ready: #16a34a;
      --idle: #565f89;
      --finished: #565f89;
      --danger: #f7768e;
      --radius: 8px;
      --gap: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    header.top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 600;
    }
    .header-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    .header-meta .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--idle);
      margin-right: 6px;
      vertical-align: middle;
    }
    .header-meta .dot.ok { background: var(--ready); }
    .header-meta .dot.warn { background: var(--needs-action); }
    .header-meta .dot.error { background: var(--danger); }

    .banner {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .banner.warn {
      background: rgba(180, 83, 9, 0.12);
      border-color: var(--needs-action);
    }
    .banner.error {
      background: rgba(247, 118, 142, 0.12);
      border-color: var(--danger);
    }
    .banner code {
      background: var(--panel-2);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.85em;
    }
    .banner a { color: var(--accent); }
    .banner.hidden { display: none; }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filters .group {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .filters .group + .group { margin-left: 14px; }
    .filters .label {
      color: var(--text-dimmer);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 4px;
    }
    .tab {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.78rem;
      transition: 0.15s;
    }
    .tab:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    .tab.active {
      background: var(--accent);
      color: #0a0e1a;
      border-color: var(--accent);
      font-weight: 600;
    }

    .sessions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: 0.15s;
    }
    .session:hover {
      border-color: var(--accent);
      background: var(--panel-2);
    }
    .session.open-pending {
      opacity: 0.6;
    }
    .session.open-error {
      border-color: var(--danger);
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--idle);
    }
    .status-dot.working {
      background: var(--working);
      animation: pulse 1.6s infinite;
    }
    .status-dot.needs_action {
      background: var(--needs-action);
      animation: pulse 1.6s infinite;
    }
    .status-dot.ready { background: var(--ready); }
    .status-dot.idle { background: var(--idle); }
    .status-dot.finished { background: var(--finished); opacity: 0.4; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
      50% { box-shadow: 0 0 0 6px transparent; opacity: 0.7; }
    }

    .kind-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 700;
      flex-shrink: 0;
      min-width: 56px;
      text-align: center;
    }
    .kind-badge.code   { background: rgba(37, 99, 235, 0.18);  color: #7aa2f7; }
    .kind-badge.cowork { background: rgba(168, 85, 247, 0.18); color: #bb9af7; }
    .kind-badge.chat   { background: rgba(234, 88, 12, 0.18);  color: #fb923c; }

    .session-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-meta {
      font-size: 0.75rem;
      color: var(--text-dimmer);
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .session-meta .when {
      min-width: 60px;
      text-align: right;
    }
    .session.from-ax .session-title {
      font-style: italic;
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      background: var(--panel);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(8px);
      transition: 0.2s;
      pointer-events: none;
    }
    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.error { border-color: var(--danger); }
    .toast.success { border-color: var(--ready); }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <h1>Claude Dashboard</h1>
      <div class="header-meta">
        <span><span id="conn-dot" class="dot"></span><span id="conn-status">connexion…</span></span>
      </div>
    </header>

    <div id="ax-banner" class="banner hidden"></div>

    <div class="filters">
      <div class="group">
        <span class="label">Statut</span>
        <button class="tab active" data-filter-status="active">Actifs</button>
        <button class="tab" data-filter-status="all">Tout</button>
      </div>
      <div class="group">
        <span class="label">Type</span>
        <button class="tab active" data-filter-kind="all">Tous</button>
        <button class="tab" data-filter-kind="code">Code</button>
        <button class="tab" data-filter-kind="cowork">Cowork</button>
        <button class="tab" data-filter-kind="chat">Chat</button>
      </div>
    </div>

    <div id="sessions" class="sessions"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SIDECAR = (() => {
      const { hostname } = window.location;
      if (hostname === 'localhost' || hostname === '127.0.0.1') return '';
      return 'http://localhost:8765';
    })();

    const STATUS_LABEL = {
      working: 'travaille',
      needs_action: 'attend toi',
      ready: 'prête',
      idle: 'inactive',
      finished: 'terminée',
    };

    const state = {
      sessions: [],
      ax: null,
      filterStatus: 'active',
      filterKind: 'all',
      sidecarAlive: false,
    };

    const sessionsEl = document.getElementById('sessions');
    const axBanner = document.getElementById('ax-banner');
    const connDot = document.getElementById('conn-dot');
    const connStatus = document.getElementById('conn-status');
    const toast = document.getElementById('toast');

    let toastTimer = null;
    function showToast(msg, variant) {
      toast.textContent = msg;
      toast.className = 'toast visible ' + (variant || '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function relTime(ts) {
      if (!ts) return '';
      const diff = Date.now() - ts;
      if (diff < 60000) return "à l'instant";
      if (diff < 3600000) return Math.floor(diff / 60000) + ' min';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' h';
      const d = Math.floor(diff / 86400000);
      return d + ' j';
    }

    function renderConn() {
      if (!state.sidecarAlive) {
        connDot.className = 'dot error';
        connStatus.textContent = 'Sidecar non détecté — lance `cd sidecar && node index.js`';
        return;
      }
      const ax = state.ax;
      if (!ax || ax.ok) {
        connDot.className = 'dot ok';
        connStatus.textContent = ax
          ? `connecté · ${state.sessions.length} sessions · AX: ${ax.itemCount || 0} nœuds`
          : `connecté · ${state.sessions.length} sessions`;
      } else if (ax.error === 'claude_not_running') {
        connDot.className = 'dot warn';
        connStatus.textContent = 'connecté · Claude Desktop fermé · Chat indispo';
      } else {
        connDot.className = 'dot warn';
        connStatus.textContent = 'connecté · AX: ' + (ax.error || 'erreur');
      }
    }

    function renderAxBanner() {
      const ax = state.ax;
      if (!ax || ax.ok || ax.error === 'claude_not_running' || ax.error === 'not_darwin') {
        axBanner.className = 'banner hidden';
        return;
      }
      axBanner.className = 'banner warn';
      if (ax.error === 'disabled') {
        axBanner.className = 'banner';
        axBanner.innerHTML = `Lecture de la sidebar Claude Desktop désactivée. Pour l'activer (Chat sessions), relance le sidecar avec <code>DASHBOARD_AX=1 node index.js</code> — attention, AX sur Electron est très lent (10-20s par lecture).`;
        return;
      }
      if (ax.error === 'no_permission' || ax.error === 'parse_failed' || ax.error === 'spawn_failed' || ax.error === 'exception') {
        axBanner.innerHTML = `
          <strong>Permission Accessibility manquante</strong> pour le terminal qui lance le sidecar.
          Ouvre <code>Réglages Système → Confidentialité et sécurité → Accessibilité</code>
          et coche la case du terminal (Terminal/iTerm/Warp), puis relance <code>node index.js</code>.
          <br>Diagnostic complet : <a href="/api/debug/ax" target="_blank">/api/debug/ax</a>
        `;
      } else if (ax.error === 'timeout') {
        axBanner.innerHTML = `Lecture AX en timeout — Claude Desktop est probablement occupé. Réessai automatique.`;
      } else if (ax.error === 'no_windows') {
        axBanner.innerHTML = `Claude Desktop n'a pas de fenêtre ouverte — clique son icône dans le Dock.`;
      } else {
        axBanner.innerHTML = `AX indisponible (${escapeHtml(ax.error)}). <a href="/api/debug/ax" target="_blank">Diagnostic</a>`;
      }
    }

    function renderFilters() {
      const counts = { code: 0, cowork: 0, chat: 0 };
      let activeCount = 0;
      const all = state.sessions.length;
      for (const s of state.sessions) {
        counts[s.kind] = (counts[s.kind] || 0) + 1;
        if (['working', 'needs_action', 'ready'].includes(s.status)) activeCount++;
      }
      document.querySelectorAll('[data-filter-status]').forEach(b => {
        b.classList.toggle('active', b.dataset.filterStatus === state.filterStatus);
        if (b.dataset.filterStatus === 'active') b.textContent = `Actifs · ${activeCount}`;
        if (b.dataset.filterStatus === 'all') b.textContent = `Tout · ${all}`;
      });
      document.querySelectorAll('[data-filter-kind]').forEach(b => {
        b.classList.toggle('active', b.dataset.filterKind === state.filterKind);
        const k = b.dataset.filterKind;
        if (k === 'all') b.textContent = `Tous · ${all}`;
        else b.textContent = `${k.charAt(0).toUpperCase() + k.slice(1)} · ${counts[k] || 0}`;
      });
    }

    function renderSessions() {
      renderConn();
      renderAxBanner();
      renderFilters();

      let list = state.sessions;
      if (state.filterStatus === 'active') {
        list = list.filter(s => ['working', 'needs_action', 'ready'].includes(s.status));
      }
      if (state.filterKind !== 'all') {
        list = list.filter(s => s.kind === state.filterKind);
      }

      if (list.length === 0) {
        sessionsEl.innerHTML = `<div class="empty">Aucune session ne correspond aux filtres.</div>`;
        return;
      }

      sessionsEl.innerHTML = list.map(s => {
        const meta = [];
        if (s.project) meta.push(escapeHtml(s.project));
        const t = s.lastEventTime ? relTime(s.lastEventTime) : '';
        return `
          <div class="session ${s.fromAx ? 'from-ax' : ''}"
               data-key="${escapeHtml(s.key)}"
               data-kind="${escapeHtml(s.kind)}"
               data-title="${escapeHtml(s.title || '')}"
               title="${escapeHtml(STATUS_LABEL[s.status] || s.status)}">
            <span class="status-dot ${s.status || 'idle'}"></span>
            <span class="kind-badge ${s.kind}">${escapeHtml(s.kind)}</span>
            <span class="session-title">${escapeHtml(s.title || '(sans titre)')}</span>
            <span class="session-meta">
              ${meta.length ? `<span>${meta.join(' · ')}</span>` : ''}
              <span class="when">${escapeHtml(t)}</span>
            </span>
          </div>
        `;
      }).join('');

      sessionsEl.querySelectorAll('.session').forEach(el => {
        el.addEventListener('click', () => openSession(el));
      });
    }

    async function openSession(el) {
      const title = el.dataset.title;
      if (!title) {
        showToast('Pas de titre pour cette session', 'error');
        return;
      }
      el.classList.add('open-pending');
      try {
        const r = await fetch(`${SIDECAR}/api/open`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ title, kind: el.dataset.kind }),
        });
        const data = await r.json();
        if (data.ok) {
          showToast('✓ Ouvert dans Claude Desktop', 'success');
        } else if (data.error && String(data.error).startsWith('miss')) {
          showToast(`Pas trouvé dans la sidebar : "${title.slice(0, 40)}…"`, 'error');
          el.classList.add('open-error');
          setTimeout(() => el.classList.remove('open-error'), 600);
        } else {
          showToast(`Erreur : ${data.error || 'inconnue'}`, 'error');
          el.classList.add('open-error');
          setTimeout(() => el.classList.remove('open-error'), 600);
        }
      } catch (e) {
        showToast(`Erreur réseau : ${e.message}`, 'error');
      } finally {
        el.classList.remove('open-pending');
      }
    }

    function applyPayload(data) {
      state.sidecarAlive = true;
      state.sessions = data.sessions || [];
      state.ax = data.ax || null;
      renderSessions();
    }

    async function poll() {
      try {
        const r = await fetch(`${SIDECAR}/api/sessions`, { cache: 'no-store' });
        if (!r.ok) throw new Error('http ' + r.status);
        applyPayload(await r.json());
      } catch (e) {
        if (state.sidecarAlive) {
          state.sidecarAlive = false;
          renderConn();
        }
      }
    }

    function connectSse() {
      try {
        const es = new EventSource(`${SIDECAR}/api/events`);
        es.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'snapshot') applyPayload(msg);
          } catch {}
        };
        es.onerror = () => { /* browser auto-reconnects */ };
      } catch {}
    }

    document.querySelectorAll('[data-filter-status]').forEach(b => {
      b.addEventListener('click', () => {
        state.filterStatus = b.dataset.filterStatus;
        renderSessions();
      });
    });
    document.querySelectorAll('[data-filter-kind]').forEach(b => {
      b.addEventListener('click', () => {
        state.filterKind = b.dataset.filterKind;
        renderSessions();
      });
    });

    poll();
    setInterval(poll, 2000);
    connectSse();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Projet</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #1a1a2e;
      background-color: #f8f9fa;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #e94560;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #e94560;
    }

    /* Hero */
    .hero {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
      background: linear-gradient(160deg, #0f3460 0%, #16213e 60%, #1a1a2e 100%);
      color: #fff;
    }

    .hero-content {
      max-width: 680px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid #e94560;
      color: #e94560;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 50px;
      margin-bottom: 1.5rem;
    }

    .hero h2 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1.25rem;
    }

    .hero h2 span {
      color: #e94560;
    }

    .hero p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #a8b2c1;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.4rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary {
      background: #e94560;
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(233, 69, 96, 0.5);
    }

    /* Responsive */
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        gap: 0.75rem;
        text-align: center;
      }

      nav a {
        margin: 0 0.6rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Mon Projet</h1>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">À propos</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <span class="hero-badge">Bienvenue</span>
      <h2>Découvrez <span>Mon Projet</span></h2>
      <p>
        Une solution moderne et élégante conçue pour vous accompagner
        dans vos projets. Simple, rapide et efficace — tout ce dont vous avez besoin.
      </p>
      <a href="#" class="btn btn-primary">En savoir plus</a>
    </div>
  </section>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalia</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-header: #570047;
      --color-btn: #FE9900;
      --color-btn-hover: #e08800;
      --color-text: #1a1a2e;
      --color-bg: #f8f9fa;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--color-header);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    header h1 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
    }

    nav a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #fff;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 3rem;
      background: linear-gradient(135deg, #f5f0f5 0%, #fff8ec 100%);
    }

    .hero h2 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: var(--color-header);
      margin-bottom: 1rem;
      line-height: 1.15;
    }

    .hero p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #555;
      max-width: 600px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      background: var(--color-btn);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem 2.25rem;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 18px rgba(254, 153, 0, 0.45);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn:hover {
      background: var(--color-btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(254, 153, 0, 0.55);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        gap: 0.75rem;
        text-align: center;
      }

      nav a {
        margin: 0 0.75rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Catalia</h1>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">À propos</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Bienvenue sur Catalia</h2>
    <p>Découvrez une expérience moderne et intuitive. Nous vous accompagnons à chaque étape pour atteindre vos objectifs.</p>
    <a href="#" class="btn">En savoir plus</a>
  </section>

</body>
</html>
